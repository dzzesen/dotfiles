- defaults:
      link:
          relink: true
          create: true

- clean:
      /etc/keyd:
      /etc/pacman.conf:

- link:
      /etc/keyd/default.conf:
          path: configs/keyd/default.conf
      /etc/pacman.conf:
          path: configs/paru/pacman.conf
          force: true

- shell:
      - command: sudo systemctl enable --now keyd
      - command: sudo keyd reload
