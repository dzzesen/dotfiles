- defaults:
      link:
          relink: true
          create: true

- clean:
      ~/:
      ~/.config:
      ~/.config/systemd/user:

- link:
      ~/.dotfiles:
          path: ""
      ~/.gitconfig:
          path: configs/git/gitconfig
      ~/.config/fish/config.fish:
          path: configs/fish/config.fish
          force: true
      ~/.config/fish/completions:
          path: configs/fish/completions
          force: true
      ~/.config/direnv/direnv.toml:
          path: configs/direnv/direnv.toml
      ~/.config/user-dirs.dirs:
          path: configs/user-dirs/user-dirs.dirs
          force: True
      ~/.config/paru/paru.conf:
          path: configs/paru/paru.conf
      ~/.config/kitty:
          path: configs/kitty
      ~/.config/zed:
          path: configs/zed
          force: True
      ~/.config/starship.toml:
          path: configs/starship/starship.toml
      ~/.config/lsd:
          path: configs/lsd

- shell:
      - command: git submodule update --init --recursive
        description: Installing dotbot
        stdout: true
      - command: systemctl --user daemon-reload
